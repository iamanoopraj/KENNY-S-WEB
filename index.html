<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kenny's Swiggy Pro UI</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
body{background:#fafafa;color:#333;padding-bottom:80px}
header{background:#C62828;color:#fff;padding:12px 16px;display:flex;justify-content:space-between;align-items:center}
.search{padding:10px;margin:10px;border-radius:20px;border:1px solid #ccc;width:calc(100% - 20px)}
.section{padding:15px}
.categories{display:flex;gap:10px;overflow-x:auto}
.cat{padding:8px 15px;background:#eee;border-radius:20px;cursor:pointer;white-space:nowrap}
.active-cat{background:#C62828;color:#fff}
.cards{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-top:10px}
.card{background:#fff;border-radius:15px;box-shadow:0 5px 12px rgba(0,0,0,0.1);overflow:hidden;transition:.3s}
.card:hover{transform:scale(1.03)}
.card img{width:100%;height:120px;object-fit:cover}
.card-content{padding:10px}
.rating{color:#ff9800;font-size:12px}
button{margin-top:8px;background:#ff9800;border:none;padding:6px 10px;border-radius:15px;cursor:pointer}
.cart{position:fixed;top:0;right:-100%;width:100%;height:100%;background:#fff;padding:15px;transition:.4s;overflow-y:auto;z-index:999}
.cart.active{right:0}
.cart-item{display:flex;justify-content:space-between;margin:10px 0}
.qty{display:flex;gap:5px}
.qty button{padding:3px 6px}
.checkout{background:#25D366;color:#fff;width:100%;padding:10px;border:none;border-radius:20px;margin-top:10px}
.bottom-nav{position:fixed;bottom:0;left:0;width:100%;background:#fff;border-top:1px solid #ddd;display:flex;justify-content:space-around;padding:10px 0}
.bottom-nav div{text-align:center;font-size:12px;cursor:pointer}
.bottom-nav span{display:block;font-size:20px}
.active-tab{color:#C62828;font-weight:600}
</style>
</head>
<body>

<header>
<h3>KENNY'S 🍔</h3>
<div onclick="toggleCart()">🛒</div>
</header>

<input class="search" placeholder="Search food..." onkeyup="searchItem(this.value)">

<section class="section">
<div class="categories">
<div class="cat active-cat" onclick="filter('all',this)">All</div>
<div class="cat" onclick="filter('fast',this)">Fast Food</div>
<div class="cat" onclick="filter('drink',this)">Drinks</div>
</div>

<div class="cards" id="menu"></div>
</section>

<div class="cart" id="cart">
<h3>Your Cart</h3>
<div id="cartItems"></div>
<h4>Total: ₹<span id="total">0</span></h4>
<input id="name" placeholder="Your Name">
<textarea id="address" placeholder="Address"></textarea>
<button class="checkout" onclick="sendWhatsApp()">Order via WhatsApp</button>
</div>

<div class="bottom-nav">
<div class="active-tab"><span>🏠</span>Home</div>
<div onclick="toggleCart()"><span>🛒</span>Cart</div>
</div>

<script>
const menu=[
{name:"Burger",price:80,cat:"fast",img:"https://images.unsplash.com/photo-1568901346375-23c9450c58cd"},
{name:"Pizza",price:120,cat:"fast",img:"https://images.unsplash.com/photo-1600891964599-f61ba0e24092"},
{name:"Momos",price:70,cat:"fast",img:"https://images.unsplash.com/photo-1604908176997-125f25cc6f3d"},
{name:"Cold Coffee",price:80,cat:"drink",img:"https://images.unsplash.com/photo-1509042239860-f550ce710b93"},
{name:"Fries",price:60,cat:"fast",img:"https://images.unsplash.com/photo-1541592106381-b31e9677c0e5"},
{name:"Shake",price:90,cat:"drink",img:"https://images.unsplash.com/photo-1572490122747-3968b75cc699"}
];

let cart={};
let currentFilter='all';

function loadMenu(){
let c=document.getElementById('menu');
c.innerHTML="";
menu.filter(i=>currentFilter==='all'||i.cat===currentFilter).forEach((item,i)=>{
c.innerHTML+=`<div class="card">
<img src="${item.img}">
<div class="card-content">
<h4>${item.name}</h4>
<div class="rating">⭐⭐⭐⭐☆</div>
<p>₹${item.price}</p>
<button onclick="add(${i})">Add</button>
</div></div>`;
});}

function filter(cat,el){
currentFilter=cat;
document.querySelectorAll('.cat').forEach(c=>c.classList.remove('active-cat'));
el.classList.add('active-cat');
loadMenu();}

function searchItem(val){
let c=document.getElementById('menu');
c.innerHTML="";
menu.filter(i=>i.name.toLowerCase().includes(val.toLowerCase())).forEach((item,i)=>{
c.innerHTML+=`<div class="card">
<img src="${item.img}">
<div class="card-content">
<h4>${item.name}</h4>
<p>₹${item.price}</p>
<button onclick="add(${i})">Add</button>
</div></div>`;
});}

function add(i){
if(!cart[i]) cart[i]={...menu[i],qty:1};
else cart[i].qty++;
renderCart();}

function changeQty(i,val){
cart[i].qty+=val;
if(cart[i].qty<=0) delete cart[i];
renderCart();}

function renderCart(){
let el=document.getElementById('cartItems');
el.innerHTML="";
let total=0;
Object.keys(cart).forEach(i=>{
let item=cart[i];
total+=item.price*item.qty;
el.innerHTML+=`<div class="cart-item">
<div>${item.name} x${item.qty}
<div class="qty">
<button onclick="changeQty(${i},-1)">-</button>
<button onclick="changeQty(${i},1)">+</button>
</div></div></div>`;
});
document.getElementById('total').innerText=total;}

function toggleCart(){document.getElementById('cart').classList.toggle('active');}

function sendWhatsApp(){
let name=document.getElementById('name').value;
let addr=document.getElementById('address').value;
if(!name||!addr){alert('Fill details');return;}
let msg=`Order:%0A`;
Object.values(cart).forEach(i=>{
msg+=`${i.name} x${i.qty} = ₹${i.price*i.qty}%0A`;});
msg+=`Total: ₹${document.getElementById('total').innerText}%0AName:${name}%0AAddress:${addr}`;
window.open(`https://wa.me/91XXXXXXXXXX?text=${msg}`,'_blank');}

loadMenu();
</script>

</body>
</html>
